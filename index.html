<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Para meu amor ❤️</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Oi meu amor, fiz isso para você...</h1>

  <div class="hearts-container" id="heartsContainer"></div>

  <main>
    <div class="heart" id="heart" title="Clique para ver a surpresa"></div>

    <div class="conteudo" id="conteudo" aria-hidden="true">
      <div class="foto-container">
        <!-- Imagens do loop serão inseridas aqui pelo JS -->
      </div>
      <p class="dedicatoria">
        Você é a luz que ilumina meus dias, o motivo do meu sorriso e o amor da minha vida. Cada momento com você é especial e fico ansioso para construir muitos mais momentos maravilhosos juntos. Te adoro para sempre! 💖
      </p>
    </div>

  </main>

 <footer>
  Cada dia que passa, me esforço mais por você 💖
</footer>

  <script src="script.js"></script>
</body>
</html>
